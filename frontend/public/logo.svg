<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bowlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
  </defs>

  <!-- Background Steam -->
  <path d="M35 38 Q30 25 35 15" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M50 33 Q55 20 48 10" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M65 38 Q60 25 65 15" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Chopsticks resting in the bowl (drawn behind the front bowl wall) -->
  <line x1="15" y1="65" x2="90" y2="15" stroke="#b45309" stroke-width="4" stroke-linecap="round" />
  <line x1="25" y1="70" x2="95" y2="25" stroke="#d97706" stroke-width="4" stroke-linecap="round" />

  <!-- Bowl Drop shadow -->
  <ellipse cx="50" cy="85" rx="30" ry="6" fill="rgba(0,0,0,0.15)" />

  <!-- Front Bowl Body -->
  <path d="M15 50 C 15 90, 85 90, 85 50 Z" fill="url(#bowlGrad)" filter="drop-shadow(0px 2px 4px rgba(0,0,0,0.2))" />
  
  <!-- Outer Rim of Bowl -->
  <ellipse cx="50" cy="50" rx="35" ry="8" fill="#22c55e" />
  
  <!-- Inner Soup / Broth -->
  <ellipse cx="50" cy="49" rx="30" ry="5" fill="#fcd34d" />
</svg>
